<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhishek Lamba | GameBoy Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --gb-dark: #081820;   /* Deepest GameBoy Green/Blue */
            --gb-mid: #346856;    /* Mid-tone */
            --gb-light: #88c070;  /* Traditional Screen Green */
            --gb-bright: #e0f8d0; /* Highlight */
            --accent: #f4af3d;
        }

        body {
            background-color: var(--gb-dark);
            /* CRT / Pixel Grid Texture */
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                              linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            color: var(--gb-bright);
            font-family: 'VT323', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            image-rendering: pixelated;
        }

        /* Pokemon Style Dialogue Box */
        #dialogue-box {
            width: 90%;
            max-width: 650px;
            margin: 30px 0;
            padding: 20px;
            background: #fff; /* Classic white dialogue box */
            border: 6px solid #444;
            border-radius: 8px;
            box-shadow: 0 8px 0 #000;
            position: relative;
            min-height: 160px;
        }

        #bio-text {
            color: #111; /* Text in dialogue boxes is usually dark */
            font-size: 1.6rem;
            line-height: 1.1;
            text-transform: uppercase;
        }

        /* The Card Hand */
        .hand {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            padding: 20px;
            width: 100%;
            max-width: 900px;
        }

        /* 8-Bit Styled Cards */
        .card {
            width: 110px;
            height: 160px;
            background: var(--gb-bright);
            border: 4px solid #000;
            color: #000;
            display: flex;
            flex-direction: column;
            padding: 8px;
            cursor: pointer;
            transition: all 0.1s steps(2); /* Jumpy, retro transition */
            box-shadow: 4px 4px 0 #000;
        }

        .card:hover {
            transform: translateY(-10px);
            background: var(--accent);
            box-shadow: 8px 8px 0 #000;
        }

        .card-title {
            font-size: 1.1rem;
            text-align: center;
            text-transform: uppercase;
            border-bottom: 2px solid #000;
            padding-bottom: 4px;
            margin-bottom: 10px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-icon {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Pixel-Art SVGs */
        .card-icon svg {
            width: 60px;
            height: 60px;
            fill: #000;
        }

        /* Modal / Window Overlays */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(8, 24, 32, 0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        #modal-window {
            width: 80%;
            max-width: 500px;
            background: var(--gb-bright);
            border: 8px solid #000;
            padding: 20px;
            color: #000;
            box-shadow: 10px 10px 0 var(--gb-mid);
        }

        .instruction {
            font-size: 1.2rem;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        @media (max-width: 600px) {
            .card { width: 40%; }
        }
    </style>
</head>
<body>

    <div id="dialogue-box">
        <div id="bio-text"></div>
    </div>

    <div class="instruction">Select an entry...</div>
    
    <div class="hand">
        <div class="card" onclick="openModal('Board Games')">
            <div class="card-title">Board Games</div>
            <div class="card-icon"><svg viewBox="0 0 24 24"><path d="M12 2h2v2h-2V2zM10 4h4v2h-4V4zM8 6h8v2H8V6zM6 8h12v12H6V8zm2 2v8h8v-8H8z"/></svg></div>
        </div>

        <div class="card" onclick="openModal('Art')">
            <div class="card-title">Art</div>
            <div class="card-icon"><svg viewBox="0 0 24 24"><path d="M4 4h16v12H4V4zm2 2v8h12V6H6zM8 18h8v2H8v-2zM4 20h16v2H4v-2z"/></svg></div>
        </div>

        <div class="card" onclick="openModal('Community')">
            <div class="card-title">Community</div>
            <div class="card-icon"><svg viewBox="0 0 24 24"><path d="M8 4h2v2H8V4zm6 0h2v2h-2V4zm-8 4h12v2H6V8zm0 4h2v8H6v-8zm8 0h2v8h-2v-8z"/></svg></div>
        </div>

        <div class="card" onclick="openModal('Social Work')">
            <div class="card-title">Social Work</div>
            <div class="card-icon"><svg viewBox="0 0 24 24"><path d="M4 10h4v2H4v-2zm12 0h4v2h-4v-2zM8 12h8v2H8v-2zm-2 2h2v4H6v-4zm10 0h2v4h-2v-4z"/></svg></div>
        </div>

        <div class="card" onclick="openModal('Education')">
            <div class="card-title">Education</div>
            <div class="card-icon"><svg viewBox="0 0 24 24"><path d="M2 6l10-4 10 4-10 4-10-4zm10 6v6l8-4v-6l-8 4z"/></svg></div>
        </div>

        <div class="card" onclick="openModal('Immersive')">
            <div class="card-title">Theatre</div>
            <div class="card-icon"><svg viewBox="0 0 24 24"><path d="M6 6h12v10H6V6zm2 2v6h8V8H8zm-4 8h2v4H4v-4zm14 0h2v4h-2v-4z"/></svg></div>
        </div>

        <div class="card" onclick="openModal('Press')">
            <div class="card-title">Press</div>
            <div class="card-icon"><svg viewBox="0 0 24 24"><path d="M4 6h16v12H4V6zm2 2v8h12V8H6zm3 2h6v4H9v-4zM11 4h2v2h-2V4z"/></svg></div>
        </div>
    </div>

    <div id="modal-overlay" onclick="closeModal()">
        <div id="modal-window" onclick="event.stopPropagation()">
            <h2 id="modal-title"></h2>
            <hr>
            <p id="modal-content">Quest details revealed soon...</p>
            <button onclick="closeModal()" style="font-family:'VT323'; cursor:pointer;">BACK</button>
        </div>
    </div>

    <script>
        const fullText = "Abhishek Lamba is a game designer, writer, performer, and educator. They co-created SHASN:AZADI, a board game about freedom struggles, which went on to become the first board game ever to win a social impact award at Games For Change. They have written, designed, and performed in immersive experiences like She Moves Tech, Blood Moon Over Bengaluru, and Half-Life Curse. They are also the creator of Artcade Night, a one of its kind event where they gamify art exhibits. Along with that, they are a co-founder of One Last Rule Club: a community of designers and artists in Bombay. They are proudly non-binary.";
        let i = 0;
        const speed = 15; // FASTER TYPEWRITER

        function typeWriter() {
            if (i < fullText.length) {
                document.getElementById("bio-text").innerHTML += fullText.charAt(i);
                i++;
                setTimeout(typeWriter, speed);
            }
        }

        function openModal(title) {
            document.getElementById("modal-title").innerText = title;
            document.getElementById("modal-overlay").style.display = "flex";
        }

        function closeModal() {
            document.getElementById("modal-overlay").style.display = "none";
        }

        window.onload = typeWriter;
    </script>
</body>
</html>
