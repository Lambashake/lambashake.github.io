<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhishek Lamba | Strategy Guide</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1c2c;
            --panel: #f4f1ea;
            --accent: #e03838;
            --gb-dark: #081820;
            --text: #111;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(#29366f 1px, transparent 1px);
            background-size: 20px 20px;
            color: #fff;
            font-family: 'VT323', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            image-rendering: pixelated;
        }

        /* --- POKEMON DIALOGUE BOX --- */
        #main-header {
            width: 90%; max-width: 700px;
            margin: 20px 0;
            background: #fff;
            border: 4px solid #000;
            border-radius: 4px;
            color: #000;
            padding: 15px;
            box-shadow: 4px 4px 0 #000;
        }
        #bio-text { font-size: 1.5rem; line-height: 1.1; text-transform: uppercase; }

        /* --- CARD HAND --- */
        .hand {
            display: flex; gap: 10px; overflow-x: auto;
            width: 100%; padding: 20px; justify-content: flex-start;
            scrollbar-width: none;
        }
        .hand::-webkit-scrollbar { display: none; }

        .card {
            flex: 0 0 100px; height: 140px;
            background: var(--panel); border: 3px solid #000;
            color: #000; padding: 5px; cursor: pointer;
            text-align: center; font-size: 0.9rem;
        }
        .card:hover { background: var(--accent); color: #fff; }

        /* --- MODAL / STRATEGY GUIDE WINDOW --- */
        #modal-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            z-index: 1000; overflow-y: auto;
            padding: 20px 0;
        }

        .guide-window {
            width: 90%; max-width: 900px;
            background: var(--panel); border: 8px solid #000;
            margin: auto; padding: 20px; color: var(--text);
            position: relative; box-shadow: 10px 10px 0 var(--accent);
        }

        .close-btn { 
            float: right; cursor: pointer; font-size: 2rem; 
            background: #000; color: #fff; padding: 0 10px;
        }

        /* --- IMAGE & LABELS (THE ARROWS) --- */
        .guide-content {
            display: flex; flex-direction: column; align-items: center;
            gap: 20px; margin-top: 20px;
        }

        .image-container {
            width: 100%; max-width: 500px;
            border: 4px solid #000; position: relative;
        }

        .main-img { width: 100%; display: block; filter: contrast(1.1); }

        /* Labels */
        .labels-list { width: 100%; list-style: none; padding: 0; }
        .label-item {
            background: #fff; border: 2px solid #000;
            margin-bottom: 10px; padding: 10px;
            font-size: 1.3rem; position: relative;
        }
        .label-num {
            background: var(--accent); color: #fff;
            padding: 0 8px; margin-right: 10px;
        }

        /* --- PRESS STYLING --- */
        .video-wrapper { width: 100%; aspect-ratio: 16/9; border: 4px solid #000; }
        .article-link {
            display: block; background: #eee; border: 2px solid #000;
            padding: 10px; margin-bottom: 5px; text-decoration: none;
            color: #000; font-size: 1.4rem;
        }
        .article-link:hover { background: var(--accent); color: #fff; }

        /* DESKTOP: ARROW EFFECT (Optional/Visual enhancement) */
        @media (min-width: 800px) {
            .guide-content { flex-direction: row; align-items: flex-start; }
            .label-item::before {
                content: '←'; position: absolute; left: -25px; top: 10px;
                font-weight: bold; color: var(--accent);
            }
        }
    </style>
</head>
<body>

    <div id="main-header">
        <div id="bio-text">Abhishek Lamba: Game Designer, Writer, Performer. [INITIATING PORTFOLIO...]</div>
    </div>

    <div class="hand" id="hand">
        <div class="card" onclick="openModal('Board Games')">BOARD GAMES</div>
        <div class="card" onclick="openModal('Art')">ART</div>
        <div class="card" onclick="openModal('Education')">EDUCATION</div>
        <div class="card" onclick="openModal('Community')">COMMUNITY</div>
        <div class="card" onclick="openModal('Immersive')">IMMERSIVE</div>
        <div class="card" onclick="openModal('Social Work')">SOCIAL WORK</div>
        <div class="card" onclick="openModal('Press')">PRESS</div>
    </div>

    <div id="modal-overlay">
        <div class="guide-window">
            <span class="close-btn" onclick="closeModal()">X</span>
            <h1 id="modal-title" style="text-transform: uppercase; margin: 0;"></h1>
            <div id="modal-body" class="guide-content">
                </div>
        </div>
    </div>

    <script>
        const data = {
            "Board Games": {
                img: "https://via.placeholder.com/500x300?text=SHASN+AZADI+SPREAD",
                points: [
                    "A political strategy game about freedom struggles. Play as revolutionaries fighting tyrannical imperial powers.",
                    "Upends traditional narratives: oppressors aren't heroes; players are the revolutionaries.",
                    "Funded on Kickstarter: raised over $200,000 from global backers.",
                    "First board game to win the Games for Change Award for social impact.",
                    "Abhishek served as Co-Creator: from initial ideation to Kickstarter fulfillment."
                ]
            },
            "Art": {
                img: "https://via.placeholder.com/500x300?text=ARTCADE+NIGHT+POSTER",
                points: [
                    "Games that lead audiences through an exhibit's narrative and historical contexts.",
                    "Artcade Night makes fine art accessible and enjoyable through play.",
                    "Sold out shows at Art+Charlie, Chemould CoLab, and CSMVS Mumbai.",
                    "A bridge between galleries and people through strategic gamification."
                ]
            },
            "Education": {
                img: "https://via.placeholder.com/500x300?text=CLASSROOM+SETTING",
                points: [
                    "Conducted courses at Indian School of Design & Innovation and Somaiya College.",
                    "Custom curriculum: Students learn by playing, then by creating.",
                    "Produced over 10 student-authored games, proving the 'Author-focused' pedagogy.",
                    "Collaborated with NGOs on art, science, gender, and game design modules."
                ]
            },
            "Community": {
                img: "https://via.placeholder.com/500x300?text=ONE+LAST+RULE+NIGHT",
                points: [
                    "One Last Rule Club: A Bombay hub for artists and creators to play and build.",
                    "Founded in 2023 with Nidhi Shetty; now a community of 80+ members.",
                    "Monthly game nights often feature custom-designed games by the founders.",
                    "Attracts a diverse mix of designers, artists, and creative thinkers."
                ]
            },
            "Immersive": {
                img: "https://via.placeholder.com/500x300?text=IMMERSIVE+SET",
                points: [
                    "Writer/Designer/Actor for 'She Moves Tech' and 'Blood Moon Over Bengaluru'.",
                    "She Moves Tech: Sci-fi exploring gender biases in Artificial Intelligence.",
                    "Blood Moon: A queer horror mystery regarding erasure and community cooperation.",
                    "A 6-year daily streak of art creation started on April 1, 2019."
                ]
            },
            "Social Work": {
                img: "https://via.placeholder.com/500x300?text=SOCIAL+WORK+CLASS",
                points: [
                    "Govandi Arts Festival: Co-authored 'Mohalla' with a class of young female designers.",
                    "Workshop lead for The Gender Lab, exploring patriarchy through narrative games.",
                    "Co-created a gamified addiction toolkit with Krupa Foundation to prevent relapse.",
                    "Gamified art and science curricula for PhilARThropy (Delhi) and Khulaa Aasman (Mumbai)."
                ]
            },
            "Press": {
                type: "press",
                video: "https://www.youtube.com/embed/4lUhJdXHriw",
                links: [
                    { t: "SHASN: AZADI Wins At Games For Change", l: "https://www.timesnownews.com/technology-science/shasn-azadi-bags-best-tabletop-game-at-games-for-change-awards-article-102566432" },
                    { t: "Interview: Blood Moon Over Bengaluru", l: "https://thenodmag.com/content/blood-moon-over-immersive-play-bengaluru" },
                    { t: "Interview: Artcade Night", l: "https://www.mid-day.com/mumbai-guide/things-to-do/article/love-art-indulge-in-this-interactive-game-night-to-learn-more-about-paintings-23515186" },
                    { t: "SHASN: AZADI - Blueprint for Semi-Coop Games", l: "https://www.boardgamequest.com/shasn-azadi-preview/" }
                ]
            }
        };

        function openModal(key) {
            const section = data[key];
            const title = document.getElementById('modal-title');
            const body = document.getElementById('modal-body');
            
            title.innerText = key;
            body.innerHTML = ""; // Clear

            if (section.type === "press") {
                body.innerHTML = `
                    <div class="video-wrapper"><iframe width="100%" height="100%" src="${section.video}" frameborder="0" allowfullscreen></iframe></div>
                    <div style="width: 100%;">
                        <div class="instruction">Article Archives:</div>
                        ${section.links.map(link => `<a href="${link.l}" target="_blank" class="article-link">${link.t}</a>`).join('')}
                    </div>
                `;
            } else {
                body.innerHTML = `
                    <div class="image-container"><img src="${section.img}" class="main-img"></div>
                    <ul class="labels-list">
                        ${section.points.map((p, i) => `<li class="label-item"><span class="label-num">${i+1}</span> ${p}</li>`).join('')}
                    </ul>
                `;
            }
            
            document.getElementById('modal-overlay').style.display = "block";
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = "none"; }
    </script>
</body>
</html>
