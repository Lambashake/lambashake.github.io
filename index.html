<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhishek Lamba | RPG Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-blue: #a8e0e0;
            --grass-green: #78c850;
            --path-brown: #f8b8a0;
            --text-box-red: #e03838;
            --accent: #f8d030;
        }

        body {
            background-color: var(--path-brown);
            background-image: linear-gradient(0deg, #edac92 1px, transparent 1px),
                              linear-gradient(90deg, #edac92 1px, transparent 1px);
            background-size: 16px 16px;
            font-family: 'VT323', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            image-rendering: pixelated;
            min-height: 100vh;
        }

        /* --- CHARACTER DIALOGUE SECTION --- */
        #intro-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 95%;
            max-width: 800px;
            margin-top: 20px;
            gap: 15px;
        }

        /* Character Sprite/Photo Frame */
        #character-portrait {
            width: 120px;
            height: 120px;
            background: #fff;
            border: 5px solid #000;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            flex-shrink: 0;
        }
        #character-portrait img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #dialogue-container {
            width: 100%;
            background: #fff;
            border: 5px solid #000;
            border-radius: 8px;
            box-shadow: 6px 6px 0 rgba(0,0,0,0.5);
            position: relative;
            min-height: 180px;
            overflow: hidden;
        }

        #dialogue-header {
            height: 25px;
            background: var(--text-box-red);
            border-bottom: 5px solid #000;
            display: flex;
            align-items: center;
            padding: 0 10px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #bio-text {
            padding: 15px;
            font-size: 1.4rem;
            line-height: 1.2;
            text-transform: uppercase;
            color: #111;
        }

        /* Responsive Intro for Desktop */
        @media (min-width: 700px) {
            #intro-wrapper { flex-direction: row; align-items: flex-end; }
            #character-portrait { width: 150px; height: 150px; margin-bottom: 10px; }
        }

        /* --- CARDS & MODAL (UNCHANGED) --- */
        .hand { display: flex; overflow-x: auto; gap: 12px; width: 100%; padding: 20px; box-sizing: border-box; scrollbar-width: none; }
        .hand::-webkit-scrollbar { display: none; }
        .card { flex: 0 0 120px; height: 180px; background: #fdf6e3; border: 4px solid #000; padding: 8px; cursor: pointer; transition: all 0.1s steps(2); box-shadow: 4px 4px 0 rgba(0,0,0,0.3); }
        .card:hover { background: var(--accent); transform: translateY(-10px); }
        .pixel-scene { width: 100%; height: 100px; border: 2px solid #000; margin-bottom: 5px; position: relative; overflow: hidden; }
        .card-title { font-size: 1rem; text-align: center; text-transform: uppercase; font-weight: bold; border-top: 1px solid #000; padding-top: 5px; }

        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; overflow-y: auto; padding: 20px 0; }
        .modal-window { width: 90%; max-width: 750px; background: #fff; border: 8px solid #000; margin: auto; padding: 20px; color: #000; box-shadow: 12px 12px 0 var(--accent); }
        .img-container { width: 100%; border: 4px solid #000; margin-bottom: 20px; background: #eee; }
        .img-container img { width: 100%; display: block; }
        .label-list { list-style: none; padding: 0; }
        .label-item { border: 2px solid #000; margin-bottom: 12px; padding: 12px; font-size: 1.4rem; line-height: 1.2; display: flex; align-items: flex-start; }
        .label-arrow { color: var(--text-box-red); margin-right: 12px; font-weight: bold; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; border: 4px solid #000; margin-bottom: 20px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .press-link { display: block; background: #eee; border: 2px solid #000; padding: 12px; margin-bottom: 8px; color: #000; text-decoration: none; font-size: 1.4rem; }
        .press-link:hover { background: var(--text-box-red); color: #fff; }

        @media (min-width: 900px) { .hand { justify-content: center; } }
    </style>
</head>
<body>

    <div id="intro-wrapper">
        <div id="character-portrait">
            <img src="https://via.placeholder.com/150?text=ABHISHEK" alt="Abhishek Portrait">
        </div>
        <div id="dialogue-container">
            <div id="dialogue-header">Abhishek Lamba</div>
            <div id="bio-text"></div>
        </div>
    </div>

    <div class="hand">
        <div class="card" onclick="openModal('Board Games')"><div class="pixel-scene" style="background:var(--path-brown)"></div><div class="card-title">Board Games</div></div>
        <div class="card" onclick="openModal('Art')"><div class="pixel-scene" style="background:#e0f8cf"></div><div class="card-title">Art</div></div>
        <div class="card" onclick="openModal('Education')"><div class="pixel-scene" style="background:#cfcfcf"></div><div class="card-title">Education</div></div>
        <div class="card" onclick="openModal('Community')"><div class="pixel-scene" style="background:var(--grass-green)"></div><div class="card-title">Community</div></div>
        <div class="card" onclick="openModal('Immersive Experiences')"><div class="pixel-scene" style="background:#1a1c2c"></div><div class="card-title">Immersive</div></div>
        <div class="card" onclick="openModal('Social Work')"><div class="pixel-scene" style="background:#f8e8b0"></div><div class="card-title">Social Work</div></div>
        <div class="card" onclick="openModal('Press Coverage')"><div class="pixel-scene" style="background:#cfcfcf"></div><div class="card-title">Press</div></div>
    </div>

    <div id="modal-overlay" onclick="closeModal()">
        <div class="modal-window" onclick="event.stopPropagation()">
            <h2 id="modal-title" style="text-transform: uppercase; margin: 0 0 20px 0; font-size: 2.2rem; border-bottom: 4px solid #000;"></h2>
            <div id="modal-content"></div>
            <button onclick="closeModal()" style="font-family:'VT323'; cursor:pointer; font-size: 1.2rem; margin-top: 15px; background:#000; color:#fff; border:none; padding: 5px 15px;">CLOSE</button>
        </div>
    </div>

    <script>
        const contentData = {
            "Board Games": {
                img: "https://via.placeholder.com/600x400?text=SHASN:+AZADI+SPREAD",
                points: [
                    "A political strategy board game about freedom struggles, in AZADI, you play as revolutionaries fighting against tyrannical imperial powers in an attempt to gain freedom.",
                    "It upends the narrative found across popular media wherein the oppressors are presented as heroes, and instead, places players in the shoes of revolutionaries.",
                    "Funded on Kickstarter, AZADI raised over 200,000$ from backers across the world.",
                    "AZADI also became the first board game ever to win the prestigious Games for Change Award, being recognized for its social impact.",
                    "Ideating this project from scratch, developing the game, and successfully funding it via Kickstarter, - Abhishek served as the co-creator of this project."
                ]
            },
            "Art": {
                img: "https://via.placeholder.com/600x400?text=ARTCADE+NIGHT+POSTER",
                points: [
                    "For Arcade Night, Abhishek creates games that take the audience on an immersive and interactive journey across an art exhibit's narrative and historical contexts.",
                    "Exploring the intersection of art and play, Artcade Night has evolved into a wonderful tool that can make art accessible and enjoyable for everyone.",
                    "Artcade Night has sold out shows in reputed art galleries across Mumbai including Art+Charlie, Chemould CoLab, and the prestigious CSMVS.",
                    "Bridging the gap between galleries, museums, and common people Artcade Night is proof of the role that gamification can play in spreading art literacy."
                ]
            },
            "Education": {
                img: "https://via.placeholder.com/600x400?text=TEACHING+PHOTO",
                points: [
                    "Abhishek has worked as an educator and has conducted game design courses at the Indian School of Design and Innovation, and Somaiya College of Design.",
                    "They have created their own curriculum around game design, where students learn by playing, and eventually creating their own games.",
                    "Abhishek’s courses have led to the creation of more than 10 games, proof of their pedagogy’s focus on creating new authors.",
                    "Abhishek has also worked as an educator with a variety of NGOs, with curriculums focusing on art, science, gender, and game design."
                ]
            },
            "Community": {
                img: "https://via.placeholder.com/600x400?text=ONE+LAST+RULE+NIGHT",
                points: [
                    "One Last Rule Club is a Bombay based community to meet-up, play games & help each other build wonderful things!",
                    "Co-founded in 2023 by Abhishek Lamba and Nidhi Shetty, what started as a way to meet fellow gamers, soon transformed into a community of 80+ members.",
                    "With a monthly game night, Abhishek and their co-founder often come up with their own games for the event.",
                    "With monthly meet-ups since 2023, One Last Rule Club has attracted many members, many of whom are artists, designers, and creators."
                ]
            },
            "Immersive Experiences": {
                img: "https://via.placeholder.com/600x400?text=IMMERSIVE+SET",
                points: [
                    "Abhishek has written, designed, and acted in in She Moves Tech and Blood Moon Over Bengaluru, immersive theater plays, which has had shows in Delhi and Bangalore.",
                    "She Moves Tech is a science fiction immersive experience set in the near future, exploring the potential consequences of gender biases in AI.",
                    "Blood Moon Over Bengaluru is a queer horror mystery, where the audience must work together to help lift a curse on a queer woman experiencing erasure from the society around her.",
                    "Since April 1, 2019, they have also created and shared a work of art on their page - a daily streak of more than 6 years of creation."
                ]
            },
            "Social Work": {
                img: "https://via.placeholder.com/600x400?text=SOCIAL+WORK+SETTING",
                points: [
                    "Abhishek served as an artist in residence at the Govandi Arts Festival, where they worked with a small class of girls, teaching them game design, and co-authoring a game called Mohalla with them.",
                    "Abhishek has designed and conducted many workshops with The Gender Lab, exploring gender and patriarchy using the medium of games and storytelling.",
                    "Along with Krupa Foundation, Abhishek has also created a gamified addiction toolkit, designed to help prevent relapse.",
                    "Abhishek has worked with PhilARThropy in Delhi, and Khulaa Aasman in Mumbai, teaching art and science to the kids through a gamified curriculum of their own creation."
                ]
            },
            "Press Coverage": {
                type: "press",
                video: "https://www.youtube.com/embed/4lUhJdXHriw",
                links: [
                    {t: "SHASN: AZADI Wins At Games For Change", l: "https://www.timesnownews.com/technology-science/shasn-azadi-bags-best-tabletop-game-at-games-for-change-awards-article-102566432"},
                    {t: "Interview about Blood Moon Over Bengaluru", l: "https://thenodmag.com/content/blood-moon-over-immersive-play-bengaluru"},
                    {t: "Interview about Artcade Night", l: "https://www.mid-day.com/mumbai-guide/things-to-do/article/love-art-indulge-in-this-interactive-game-night-to-learn-more-about-paintings-23515186"},
                    {t: "SHASN: AZADI as a blueprint for semi-cooperative games", l: "https://www.boardgamequest.com/shasn-azadi-preview/"}
                ]
            }
        };

        function openModal(key) {
            const section = contentData[key];
            const title = document.getElementById('modal-title');
            const content = document.getElementById('modal-content');
            title.innerText = key;
            if (section.type === "press") {
                content.innerHTML = `<div class="video-container"><iframe src="${section.video}" frameborder="0" allowfullscreen></iframe></div>` + section.links.map(link => `<a href="${link.l}" class="press-link" target="_blank">${link.t}</a>`).join('');
            } else {
                content.innerHTML = `<div class="img-container"><img src="${section.img}"></div><ul class="label-list">` + section.points.map(p => `<li class="label-item"><span class="label-arrow">→</span>${p}</li>`).join('') + `</ul>`;
            }
            document.getElementById('modal-overlay').style.display = "block";
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = "none"; }

        // REVERTED FULL BIO TEXT
        const fullBioText = "Abhishek Lamba is a game designer, writer, performer, and educator. They co-created SHASN:AZADI, a board game about freedom struggles, which went on to become the first board game ever to win a social impact award at Games For Change. They have written, designed, and performed in immersive experiences like She Moves Tech, Blood Moon Over Bengaluru, and Half-Life Curse. They are also the creator of Artcade Night, a one of its kind event where they gamify art exhibits. Along with that, they are a co-founder of One Last Rule Club: a community of designers and artists in Bombay. They are proudly non-binary.";
        
        let j = 0;
        function type() {
            if (j < fullBioText.length) {
                document.getElementById('bio-text').innerHTML += fullBioText.charAt(j);
                j++;
                setTimeout(type, 8); // Fast typing
            }
        }
        window.onload = type;
    </script>
</body>
</html>
