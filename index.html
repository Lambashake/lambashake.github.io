<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhishek Lamba | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-blue: #a8e0e0;
            --grass-green: #78c850;
            --path-brown: #f8b8a0;
            --text-box-red: #e03838;
            --accent: #f8d030;
            --ink: #111;
        }

        body {
            background-color: var(--path-brown);
            background-image: linear-gradient(0deg, #edac92 1px, transparent 1px),
                              linear-gradient(90deg, #edac92 1px, transparent 1px);
            background-size: 16px 16px;
            font-family: 'VT323', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            image-rendering: pixelated;
            min-height: 100vh;
        }

        /* --- CHARACTER SECTION --- */
        #intro-wrapper { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 95%; 
            max-width: 850px; 
            margin-top: 30px; 
            gap: 20px; 
        }
        
        #character-portrait { 
            width: 180px; 
            height: 240px; 
            background: #fff; 
            border: 6px solid #000; 
            box-shadow: 6px 6px 0 rgba(0,0,0,0.5); 
            overflow: hidden; 
            flex-shrink: 0; 
        }
        
        #character-portrait img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            object-position: center 20%; 
        }

        #dialogue-container { 
            width: 100%; 
            background: #fff; 
            border: 6px solid #000; 
            border-radius: 8px; 
            box-shadow: 8px 8px 0 rgba(0,0,0,0.5); 
            position: relative; 
            min-height: 180px; 
        }

        #dialogue-header { 
            height: 30px; 
            background: var(--text-box-red); 
            border-bottom: 6px solid #000; 
            display: flex; 
            align-items: center; 
            padding: 0 15px; 
            color: #fff; 
            text-transform: uppercase; 
            font-size: 1.4rem;
        }

        #bio-text { padding: 15px; font-size: 1.5rem; line-height: 1.3; text-transform: uppercase; color: #111; }

        /* --- CONTACT STATS BAR --- */
        #contact-bar {
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 10px;
            justify-content: center;
        }
        .contact-item {
            background: #fff;
            border: 3px solid #000;
            padding: 5px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            text-transform: uppercase;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.2);
            color: #000;
            text-decoration: none;
        }
        .contact-item:hover { background: var(--accent); }
        .contact-icon { width: 24px; height: 24px; stroke: #000; fill: none; stroke-width: 2; }

        /* --- UI & PROGRESS --- */
        #ui-wrapper { margin-top: 25px; display: flex; flex-direction: column; align-items: center; width: 100%; }
        #prog-container { width: 80%; max-width: 300px; height: 16px; background: rgba(0,0,0,0.2); border: 4px solid #000; margin-bottom: 10px; }
        #prog-bar { height: 100%; width: 0%; background: var(--grass-green); transition: width 0.4s steps(7); }
        #prog-label { font-size: 1.3rem; text-transform: uppercase; margin-bottom: 15px; }
        .instruction-text { font-size: 1.8rem; color: #000; text-transform: uppercase; background: var(--accent); padding: 0 10px; border: 4px solid #000; margin-bottom: 8px; }

        /* --- CARDS --- */
        .hand { display: flex; overflow-x: auto; gap: 15px; width: 100%; padding: 10px 20px; box-sizing: border-box; scrollbar-width: none; }
        .hand::-webkit-scrollbar { display: none; }
        .card { flex: 0 0 130px; height: 190px; background: #fdf6e3; border: 4px solid #000; padding: 10px; cursor: pointer; transition: transform 0.1s steps(2); box-shadow: 5px 5px 0 rgba(0,0,0,0.3); display: flex; flex-direction: column; }
        .card:hover { background: var(--accent); transform: translateY(-10px); }
        .symbol-box { width: 100%; height: 110px; border: 2px solid #000; margin-bottom: 8px; display: flex; justify-content: center; align-items: center; background: #fff; }
        .card-title { font-size: 1.1rem; text-align: center; text-transform: uppercase; font-weight: bold; border-top: 1px solid #000; padding-top: 8px; margin-top: auto; color: var(--ink); }
        svg.card-svg { width: 60px; height: 60px; fill: none; stroke: #000; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        /* --- MODAL --- */
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; overflow-y: auto; padding: 20px 0; }
        .modal-window { width: 90%; max-width: 850px; background: #fff; border: 8px solid #000; margin: auto; padding: 25px; color: #000; box-shadow: 12px 12px 0 var(--accent); }
        
        .img-container { width: 100%; background: #111; border: 4px solid #000; margin-bottom: 20px; display: flex; justify-content: center; overflow: hidden; }
        .img-container img { max-width: 100%; max-height: 450px; height: auto; display: block; object-fit: contain; }

        /* --- LOADING SCREEN --- */
        #loading-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 4000; flex-direction: column; justify-content: center; align-items: center; color: var(--accent); }
        .load-bar-container { width: 250px; height: 20px; border: 4px solid #fff; margin-top: 15px; position: relative; }
        #load-bar-fill { width: 0%; height: 100%; background: var(--accent); }

        .label-list { list-style: none; padding: 0; }
        .label-item { border: 2px solid #000; margin-bottom: 12px; padding: 12px; font-size: 1.4rem; line-height: 1.3; display: flex; align-items: flex-start; }
        .label-arrow { color: var(--text-box-red); margin-right: 12px; font-weight: bold; }
        
        /* --- PRESS --- */
        .video-hero { width: 100%; position: relative; padding-bottom: 56.25%; margin-bottom: 30px; border: 6px solid #000; background: #000;}
        .video-hero iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .press-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .press-link { display: block; background: #eee; border: 2px solid #000; padding: 12px; color: #000; text-decoration: none; font-size: 1.4rem; text-transform: uppercase; }
        .press-link:hover { background: var(--text-box-red); color: #fff; }

        /* --- MASTERY --- */
        #mastery-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; justify-content: center; align-items: center; }
        .mastery-window { width: 85%; max-width: 450px; background: #000; border: 8px solid #fff; padding: 30px; color: #fff; text-align: center; box-shadow: 15px 15px 0 var(--accent); }
        .trophy-svg { width: 100px; height: 100px; stroke: var(--accent); margin-bottom: 15px; }

        @media (min-width: 700px) {
            #intro-wrapper { flex-direction: row; align-items: flex-start; }
            #character-portrait { width: 220px; height: 300px; }
            .press-grid { grid-template-columns: 1fr 1fr; }
            #contact-bar { justify-content: flex-start; }
        }
        @media (min-width: 900px) { .hand { justify-content: center; } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div style="font-size: 2.5rem; text-transform: uppercase;">Loading Quest...</div>
        <div class="load-bar-container">
            <div id="load-bar-fill"></div>
        </div>
    </div>

    <div id="intro-wrapper">
        <div id="character-portrait">
            <img src="assets/portrait.jpg" alt="Abhishek">
        </div>
        <div id="dialogue-container">
            <div id="dialogue-header">An Introduction</div>
            <div id="bio-text"></div>
            <div id="contact-bar">
                <a href="mailto:abhishek.s.lamba@gmail.com" class="contact-item">
                    <svg class="contact-icon" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    abhishek.s.lamba@gmail.com
                </a>
                <a href="tel:+919619534374" class="contact-item">
                    <svg class="contact-icon" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                    +91 9619534374
                </a>
            </div>
        </div>
    </div>

    <div id="ui-wrapper">
        <div id="prog-container"><div id="prog-bar"></div></div>
        <div id="prog-label">Exploration Progress: <span id="visited-count">0</span>/7</div>
        <div class="instruction-text">Select a Card:</div>
    </div>

    <div class="hand">
        <div class="card" onclick="openModal('Board Games')">
            <div class="symbol-box"><svg class="card-svg" viewBox="0 0 24 24"><path d="M12 2L8 6h8l-4-4zM7 22h10v-2H7v2zM9 19h6l-1-11H10l-1 11z"/></svg></div>
            <div class="card-title">Board Games</div>
        </div>
        <div class="card" onclick="openModal('Art')">
            <div class="symbol-box"><svg class="card-svg" viewBox="0 0 24 24"><path d="M7 22l2-6M17 22l-2-6M12 16v3" /><path d="M5 4h14v12H5z" /><path d="M5 14c2-2 4-2 6 0" /><path d="M10 15c3-4 6-4 9-1" /></svg></div>
            <div class="card-title">Art</div>
        </div>
        <div class="card" onclick="openModal('Education')">
            <div class="symbol-box"><svg class="card-svg" viewBox="0 0 24 24"><path d="M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82zM12 3L1 9l11 6 11-6-11-6z"/></svg></div>
            <div class="card-title">Education</div>
        </div>
        <div class="card" onclick="openModal('Community')">
            <div class="symbol-box"><svg class="card-svg" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg></div>
            <div class="card-title">Community</div>
        </div>
        <div class="card" onclick="openModal('Immersive Experiences')">
            <div class="symbol-box"><svg class="card-svg" viewBox="0 0 24 24"><path d="M11 2L5.5 11h11L11 2zM6 12l-5 8h20l-5-8H6z"/></svg></div>
            <div class="card-title">Immersive Theatre</div>
        </div>
        <div class="card" onclick="openModal('Social Work')">
            <div class="symbol-box"><svg class="card-svg" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></div>
            <div class="card-title">Social Work</div>
        </div>
        <div class="card" onclick="openModal('Press Coverage')">
            <div class="symbol-box"><svg class="card-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg></div>
            <div class="card-title">Press</div>
        </div>
    </div>

    <div id="modal-overlay" onclick="closeModal()">
        <div class="modal-window" onclick="event.stopPropagation()">
            <h2 id="modal-title" style="text-transform: uppercase; margin: 0 0 20px 0; font-size: 2.2rem; border-bottom: 4px solid #000;"></h2>
            <div id="modal-content"></div>
            <button onclick="closeModal()" style="font-family:'VT323'; cursor:pointer; font-size: 1.5rem; background:#000; color:#fff; border:none; padding: 5px 15px; margin-top: 15px;">CLOSE</button>
        </div>
    </div>

    <div id="mastery-overlay">
        <div class="mastery-window">
            <div style="color:var(--accent); text-transform:uppercase; font-size:2.2rem; margin-bottom:10px;">Quest Complete!</div>
            <svg class="trophy-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M6 9H4.5a2.5 2.5 0 010-5H6M18 9h1.5a2.5 2.5 0 000-5H18M4 22h16M10 14.66V17c0 .55.45 1 1 1h2c.55 0 1-.45 1-1v-2.34M12 4v10.66M8 4h8v9a4 4 0 01-8 0V4z"/>
            </svg>
            <div style="font-size: 1.6rem; margin-bottom: 20px;">YOU HAVE UNLOCKED THE FINAL DOSSIER.</div>
            <div style="font-size: 2.5rem; background: var(--accent); color: #000; padding: 10px; border: 4px solid #fff; margin-bottom: 25px;">Trophy: Knower of Abhishek</div>
            <button onclick="closeMastery()" style="font-family:'VT323'; cursor:pointer; font-size: 1.5rem; background:#fff; color:#000; padding: 8px 20px; border:none; text-transform:uppercase;">Continue</button>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, type, duration, vol) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const sfx = {
            hover: () => playSound(400, 'square', 0.1, 0.05),
            open: () => {
                playSound(523.25, 'square', 0.2, 0.1); 
                setTimeout(() => playSound(659.25, 'square', 0.3, 0.1), 100);
            },
            win: () => {
                const notes = [523, 659, 783, 1046];
                notes.forEach((f, i) => setTimeout(() => playSound(f, 'square', 0.6, 0.15), i * 150));
            }
        };

        const contentData = {
            "Board Games": { img: "assets/shasn.jpg", points: ["A political strategy board game about freedom struggles, in AZADI, you play as revolutionaries fighting against tyrannical imperial powers in an attempt to gain freedom.", "It upends the narrative found across popular media wherein the oppressors are presented as heroes, and instead, places players in the shoes of revolutionaries.", "Funded on Kickstarter, AZADI raised over 200,000$ from backers across the world.", "AZADI also became the first board game ever to win the prestigious Games for Change Award, being recognized for its social impact.", "Ideating this project from scratch, developing the game, and successfully funding it via Kickstarter, - Abhishek served as the co-creator of this project."] },
            "Art": { img: "assets/artcade.jpg", points: ["For Arcade Night, Abhishek creates games that take the audience on an immersive and interactive journey across an art exhibit's narrative and historical contexts.", "Exploring the intersection of art and play, Artcade Night has evolved into a wonderful tool that can make art accessible and enjoyable for everyone.", "Artcade Night has sold out shows in reputed art galleries across Mumbai including Art+Charlie, Chemould CoLab, and the prestigious CSMVS.", "Bridging the gap between galleries, museums, and common people Artcade Night is proof of the role that gamification can play in spreading art literacy."] },
            "Education": { img: "assets/teaching.jpg", points: ["Abhishek has worked as an educator and has conducted game design courses at the Indian School of Design and Innovation, and Somaiya College of Design.", "They have created their own curriculum around game design, where students learn by playing, and eventually creating their own games.", "Abhishek’s courses have led to the creation of more than 10 games, proof of their pedagogy’s focus on creating new authors.", "Abhishek has also worked as an educator with a variety of NGOs, with curriculums focusing on art, science, gender, and game design."] },
            "Community": { img: "assets/community.jpg", points: ["One Last Rule Club is a Bombay based community to meet-up, play games & help each other build wonderful things!", "Co-founded in 2023 by Abhishek Lamba and Nidhi Shetty, what started as a way to meet fellow gamers, soon transformed into a community of 80+ members.", "With a monthly game night, Abhishek and their co-founder often come up with their own games for the event.", "With monthly meet-ups since 2023, One Last Rule Club has attracted many members, many of whom are artists, designers, and creators."] },
            "Immersive Experiences": { img: "assets/immersive.jpg", points: ["Abhishek has written, designed, and acted in in She Moves Tech and Blood Moon Over Bengaluru, immersive theater plays, which has had shows in Delhi and Bangalore.", "She Moves Tech is a science fiction immersive experience set in the near future, exploring the potential consequences of gender biases in AI.", "Blood Moon Over Bengaluru is a queer horror mystery, where the audience must work together to help lift a curse on a queer woman experiencing erasure from the society around her.", "Since April 1, 2019, they have also created and shared a work of art on their page - a daily streak of more than 6 years of creation."] },
            "Social Work": { img: "assets/social.jpg", points: ["Abhishek served as an artist in residence at the Govandi Arts Festival, where they worked with a small class of girls, teaching them game design, and co-authoring a game called Mohalla with them.", "Abhishek has designed and conducted many workshops with The Gender Lab, exploring gender and patriarchy using the medium of games and storytelling.", "Along with Krupa Foundation, Abhishek has also created a gamified addiction toolkit, designed to help prevent relapse.", "Abhishek has worked with PhilARThropy in Delhi, and Khulaa Aasman in Mumbai, teaching art and science to the kids through a gamified curriculum of their own creation."] },
            "Press Coverage": { type: "press", video: "https://www.youtube.com/embed/4lUhJdXHriw", links: [{t: "SHASN: AZADI Wins At Games For Change", l: "https://www.timesnownews.com/technology-science/shasn-azadi-bags-best-tabletop-game-at-games-for-change-awards-article-102566432"}, {t: "Interview about Blood Moon Over Bengaluru", l: "https://thenodmag.com/content/blood-moon-over-immersive-play-bengaluru"}, {t: "Interview about Artcade Night", l: "https://www.mid-day.com/mumbai-guide/things-to-do/article/love-art-indulge-in-this-interactive-game-night-to-learn-more-about-paintings-23515186"}, {t: "SHASN: AZADI as a blueprint for semi-cooperative games", l: "https://www.boardgamequest.com/shasn-azadi-preview/"}] }
        };

        const fullBioText = "Abhishek Lamba is a game designer, writer, performer, and educator. They co-created SHASN:AZADI, a board game about freedom struggles, which went on to become the first board game ever to win a social impact award at Games For Change. They have written, designed, and performed in immersive experiences like She Moves Tech, Blood Moon Over Bengaluru, and Half-Life Curse. They are also the creator of Artcade Night, a one of its kind event where they gamify art exhibits. Along with that, they are a co-founder of One Last Rule Club: a community of designers and artists in Bombay. They are proudly non-binary.";
        
        let j = 0;
        function type() { if (j < fullBioText.length) { document.getElementById('bio-text').innerHTML += fullBioText.charAt(j); j++; setTimeout(type, 8); } }

        let visited = JSON.parse(localStorage.getItem('visited_sections')) || [];
        function updateProgress() {
            document.getElementById('visited-count').innerText = visited.length;
            document.getElementById('prog-bar').style.width = ((visited.length / 7) * 100) + '%';
        }

        function openModal(key) {
            const loading = document.getElementById('loading-screen');
            const fill = document.getElementById('load-bar-fill');
            loading.style.display = 'flex';
            fill.style.width = '0%';
            setTimeout(() => { fill.style.transition = 'width 0.6s linear'; fill.style.width = '100%'; }, 50);

            setTimeout(() => {
                loading.style.display = 'none';
                fill.style.transition = 'none';
                sfx.open(); 
                if (!visited.includes(key)) {
                    visited.push(key);
                    localStorage.setItem('visited_sections', JSON.stringify(visited));
                    updateProgress();
                }
                const section = contentData[key];
                const content = document.getElementById('modal-content');
                document.getElementById('modal-title').innerText = key;
                if (section.type === "press") {
                    content.innerHTML = `<div class="video-hero"><iframe src="${section.video}" frameborder="0" allowfullscreen></iframe></div><div class="press-grid">` + section.links.map(link => `<a href="${link.l}" class="press-link" target="_blank">${link.t}</a>`).join('') + `</div>`;
                } else {
                    content.innerHTML = `<div class="img-container"><img src="${section.img}"></div><ul class="label-list">` + section.points.map(p => `<li class="label-item"><span class="label-arrow">→</span>${p}</li>`).join('') + `</ul>`;
                }
                document.getElementById('modal-overlay').style.display = "block";
                if (visited.length === 7 && !localStorage.getItem('mastery_achieved')) {
                    setTimeout(() => { sfx.win(); revealMastery(); }, 1200); 
                }
            }, 700);
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = "none"; }
        function revealMastery() { document.getElementById('mastery-overlay').style.display = "flex"; localStorage.setItem('mastery_achieved', 'true'); }
        function closeMastery() { document.getElementById('mastery-overlay').style.display = "none"; }

        document.querySelectorAll('.card, .contact-item').forEach(el => el.addEventListener('mouseenter', () => sfx.hover()));
        type();
        updateProgress();
    </script>
</body>
</html>
