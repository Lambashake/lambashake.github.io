<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhishek Lamba | Game Designer</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1c2c; /* Deep retro blue/black */
            --accent: #f4af3d; 
            --card-white: #f4f1ea;
            --window-bg: #fff;
            --text-main: #fff;
        }

        body {
            background: var(--bg);
            /* Retro 8-bit dithered background pattern */
            background-image: radial-gradient(#29366f 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text-main);
            font-family: 'VT323', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* RPG Text Box (The Bio) */
        #dialogue-container {
            width: 90%;
            max-width: 700px;
            margin: 40px 0;
            padding: 20px;
            background: #000;
            border: 4px solid #fff;
            box-shadow: inset 0 0 0 4px #000;
            min-height: 200px;
            position: relative;
        }

        #bio-text {
            font-size: 1.8rem;
            line-height: 1.2;
            letter-spacing: 1px;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background: var(--accent);
            animation: blink 0.8s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* The Player's Hand (Mobile Friendly) */
        #hand-wrapper {
            width: 100%;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .instruction {
            color: var(--accent);
            font-size: 1.5rem;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .hand {
            display: flex;
            justify-content: center;
            flex-wrap: wrap; /* Wraps on mobile */
            gap: 10px;
            width: 100%;
            max-width: 1000px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Pixel-Card Style */
        .card {
            width: 120px;
            height: 180px;
            background: var(--card-white);
            border: 3px solid #000;
            border-radius: 4px;
            color: #000;
            display: flex;
            flex-direction: column;
            padding: 8px;
            cursor: pointer;
            transition: transform 0.2s;
            position: relative;
        }

        .card:hover {
            transform: translateY(-20px) scale(1.1);
            z-index: 10;
        }

        .card-title {
            font-size: 1.1rem;
            text-align: center;
            text-transform: uppercase;
            border-bottom: 2px solid #000;
            margin-bottom: 10px;
        }

        .card-icon {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        /* Popup Window (Modal) */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        #modal-window {
            width: 85%;
            max-width: 600px;
            background: #fff;
            border: 6px solid #000;
            padding: 30px;
            color: #000;
            position: relative;
        }

        #close-btn {
            position: absolute;
            top: 10px; right: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 2rem;
        }

        @media (max-width: 600px) {
            .card { width: 45%; height: 160px; } /* 2 per row on mobile */
            #dialogue-container { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div id="dialogue-container">
        <div id="bio-text"></div><span class="cursor"></span>
    </div>

    <div id="hand-wrapper">
        <div class="instruction">Pick a card from your hand</div>
        <div class="hand">
            <div class="card" onclick="openModal('Board Games')"><div class="card-title">Board Games</div><div class="card-icon">♙</div></div>
            <div class="card" onclick="openModal('Art')"><div class="card-title">Art</div><div class="card-icon">🎨</div></div>
            <div class="card" onclick="openModal('Community')"><div class="card-icon">👥</div><div class="card-title">Community</div></div>
            <div class="card" onclick="openModal('Social Work')"><div class="card-icon">🤝</div><div class="card-title">Social Work</div></div>
            <div class="card" onclick="openModal('Education')"><div class="card-icon">🎓</div><div class="card-title">Education</div></div>
            <div class="card" onclick="openModal('Immersive')"><div class="card-icon">🎭</div><div class="card-title">Theatre</div></div>
            <div class="card" onclick="openModal('Press')"><div class="card-icon">📷</div><div class="card-title">Press</div></div>
        </div>
    </div>

    <div id="modal-overlay" onclick="closeModal()">
        <div id="modal-window" onclick="event.stopPropagation()">
            <div id="close-btn" onclick="closeModal()">×</div>
            <h2 id="modal-title" style="text-transform: uppercase;"></h2>
            <hr>
            <p id="modal-content">Quest details loading...</p>
        </div>
    </div>

    <script>
        // TYPEWRITER EFFECT
        const fullText = "Abhishek Lamba is a game designer, writer, performer, and educator. They co-created SHASN:AZADI, a board game about freedom struggles, which went on to become the first board game ever to win a social impact award at Games For Change. They have written, designed, and performed in immersive experiences like She Moves Tech, Blood Moon Over Bengaluru, and Half-Life Curse. They are also the creator of Artcade Night, a one of its kind event where they gamify art exhibits. Along with that, they are a co-founder of One Last Rule Club: a community of designers and artists in Bombay. They are proudly non-binary.";
        let i = 0;
        const speed = 40; // milliseconds

        function typeWriter() {
            if (i < fullText.length) {
                document.getElementById("bio-text").innerHTML += fullText.charAt(i);
                i++;
                setTimeout(typeWriter, speed);
            }
        }

        // MODAL LOGIC
        function openModal(title) {
            document.getElementById("modal-title").innerText = title;
            document.getElementById("modal-overlay").style.display = "flex";
        }

        function closeModal() {
            document.getElementById("modal-overlay").style.display = "none";
        }

        // Start typewriter on load
        window.onload = typeWriter;
    </script>
</body>
</html>
