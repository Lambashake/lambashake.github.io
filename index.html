<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhishek Lamba | RPG Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-blue: #a8e0e0;
            --grass-green: #78c850;
            --path-brown: #f8b8a0;
            --text-box-red: #e03838;
            --accent: #f8d030;
            --ink: #111;
        }

        body {
            background-color: var(--path-brown);
            background-image: linear-gradient(0deg, #edac92 1px, transparent 1px),
                              linear-gradient(90deg, #edac92 1px, transparent 1px);
            background-size: 16px 16px;
            font-family: 'VT323', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            image-rendering: pixelated;
            min-height: 100vh;
        }

        /* --- CHARACTER DIALOGUE SECTION --- */
        #intro-wrapper { display: flex; flex-direction: column; align-items: center; width: 95%; max-width: 800px; margin-top: 20px; gap: 15px; }
        #character-portrait { width: 120px; height: 120px; background: #fff; border: 5px solid #000; box-shadow: 4px 4px 0 rgba(0,0,0,0.5); overflow: hidden; flex-shrink: 0; }
        #character-portrait img { width: 100%; height: 100%; object-fit: cover; }
        #dialogue-container { width: 100%; background: #fff; border: 5px solid #000; border-radius: 8px; box-shadow: 6px 6px 0 rgba(0,0,0,0.5); position: relative; min-height: 160px; }
        #dialogue-header { height: 25px; background: var(--text-box-red); border-bottom: 5px solid #000; display: flex; align-items: center; padding: 0 10px; color: #fff; text-transform: uppercase; }
        #bio-text { padding: 12px; font-size: 1.4rem; line-height: 1.2; text-transform: uppercase; color: #111; }

        /* --- UI & PROGRESS BAR --- */
        #ui-wrapper { margin-top: 20px; display: flex; flex-direction: column; align-items: center; width: 100%; }
        #prog-container { width: 80%; max-width: 300px; height: 14px; background: rgba(0,0,0,0.2); border: 3px solid #000; margin-bottom: 10px; }
        #prog-bar { height: 100%; width: 0%; background: var(--grass-green); transition: width 0.4s steps(7); }
        #prog-label { font-size: 1.2rem; text-transform: uppercase; margin-bottom: 15px; }
        .instruction-text { font-size: 1.8rem; color: #000; text-transform: uppercase; background: var(--accent); padding: 0 10px; border: 3px solid #000; margin-bottom: 8px; }

        /* --- CARDS --- */
        .hand { display: flex; overflow-x: auto; gap: 12px; width: 100%; padding: 10px 20px; box-sizing: border-box; scrollbar-width: none; }
        .hand::-webkit-scrollbar { display: none; }
        .card { flex: 0 0 120px; height: 180px; background: #fdf6e3; border: 4px solid #000; padding: 8px; cursor: pointer; transition: transform 0.1s steps(2); box-shadow: 4px 4px 0 rgba(0,0,0,0.3); display: flex; flex-direction: column; }
        .card:hover { background: var(--accent); transform: translateY(-10px); }
        .symbol-box { width: 100%; height: 100px; border: 2px solid #000; margin-bottom: 5px; display: flex; justify-content: center; align-items: center; background: #fff; }
        .card-title { font-size: 1rem; text-align: center; text-transform: uppercase; font-weight: bold; border-top: 1px solid #000; padding-top: 5px; margin-top: auto; color: var(--ink); }
        svg { width: 55px; height: 55px; fill: none; stroke: #000; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        /* --- MODAL & LOADING --- */
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; overflow-y: auto; padding: 20px 0; }
        .modal-window { width: 90%; max-width: 850px; background: #fff; border: 8px solid #000; margin: auto; padding: 20px; color: #000; box-shadow: 12px 12px 0 var(--accent); }
        
        #loading-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 4000; flex-direction: column; justify-content: center; align-items: center; color: var(--accent); font-size: 3rem; }

        /* --- PRESS PAGE HERO STYLING --- */
        .video-hero { width: 100%; position: relative; padding-bottom: 56.25%; /* 16:9 Aspect Ratio */ margin-bottom: 30px; border: 6px solid #000; box-shadow: 8px 8px 0 rgba(0,0,0,0.2); }
        .video-hero iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .press-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }

        .img-container { width: 100%; border: 4px solid #000; margin-bottom: 20px; }
        .img-container img { width: 100%; display: block; }
        .label-list { list-style: none; padding: 0; }
        .label-item { border: 2px solid #000; margin-bottom: 12px; padding: 12px; font-size: 1.4rem; line-height: 1.2; display: flex; align-items: flex-start; }
        .label-arrow { color: var(--text-box-red); margin-right: 12px; font-weight: bold; }
        .press-link { display: block; background: #eee; border: 2px solid #000; padding: 12px; color: #000; text-decoration: none; font-size: 1.4rem; text-transform: uppercase; }
        .press-link:hover { background: var(--text-box-red); color: #fff; }

        /* --- MASTERY OVERLAY --- */
        #mastery-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; justify-content: center; align-items: center; }
        .mastery-window { width: 85%; max-width: 450px; background: #000; border: 8px solid #fff; padding: 30px; color: #fff; text-align: center; box-shadow: 15px 15px 0 var(--accent); }
        .trophy-svg { width: 100px; height: 100px; stroke: var(--accent); margin-bottom: 15px; }

        @media (min-width: 700px) {
            #intro-wrapper { flex-direction: row; align-items: flex-end; }
            #character-portrait { width: 150px; height: 150px; }
            .press-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (min-width: 900px) { .hand { justify-content: center; } }
    </style>
</head>
<body>

    <div id="loading-screen">LOADING QUEST...</div>

    <div id="intro-wrapper">
        <div id="character-portrait">
            <img src="assets/portrait.jpg" alt="Abhishek">
        </div>
        <div id="dialogue-container">
            <div id="dialogue-header">Abhishek Lamba</div>
            <div id="bio-text"></div>
        </div>
    </div>

    <div id="ui-wrapper">
        <div id="prog-container"><div id="prog-bar"></div></div>
        <div id="prog-label">Exploration Progress: <span id="visited-count">0</span>/7</div>
        <div class="instruction-text">Select a Card:</div>
    </div>

    <div class="hand">
        <div class="card" onclick="openModal('Board Games')">
            <div class="symbol-box"><svg viewBox="0 0 24 24"><path d="M12 2L8 6h8l-4-4zM7 22h10v-2H7v2zM9 19h6l-1-11H10l-1 11z"/></svg></div>
            <div class="card-title">Board Games</div>
        </div>
        <div class="card" onclick="openModal('Art')">
            <div class="symbol-box">
                <svg viewBox="0 0 24 24"><path d="M7 22l2-6M17 22l-2-6M12 16v3" /><path d="M5 4h14v12H5z" /><path d="M5 14c2-2 4-2 6 0" /><path d="M10 15c3-4 6-4 9-1" /></svg>
            </div>
            <div class="card-title">Art</div>
        </div>
        <div class="card" onclick="openModal('Education')">
            <div class="symbol-box"><svg viewBox="0 0 24 24"><path d="M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82zM12 3L1 9l11 6 11-6-11-6z"/></svg></div>
            <div class="card-title">Education</div>
        </div>
        <div class="card" onclick="openModal('Community')">
            <div class="symbol-box"><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg></div>
            <div class="card-title">Community</div>
        </div>
        <div class="card" onclick="openModal('Immersive Experiences')">
            <div class="symbol-box"><svg viewBox="0 0 24 24"><path d="M11 2L5.5 11h11L11 2zM6 12l-5 8h20l-5-8H6z"/></svg></div>
            <div class="card-title">Immersive Theatre</div>
        </div>
        <div class="card" onclick="openModal('Social Work')">
            <div class="symbol-box"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></div>
            <div class="card-title">Social Work</div>
        </div>
        <div class="card" onclick="openModal('Press Coverage')">
            <div class="symbol-box"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg></div>
            <div class="card-title">Press</div>
        </div>
    </div>

    <div id="modal-overlay" onclick="closeModal()">
        <div class="modal-window" onclick="event.stopPropagation()">
            <h2 id="modal-title" style="text-transform: uppercase; margin: 0 0 20px 0; font-size: 2.2rem; border-bottom: 4px solid #000;"></h2>
            <div id="modal-content"></div>
            <button onclick="closeModal()" style="font-family:'VT323'; cursor:pointer; font-size: 1.5rem; background:#000; color:#fff; border:none; padding: 5px 15px; margin-top: 15px;">CLOSE</button>
        </div>
    </div>

    <div id="mastery-overlay">
        <div class="mastery-window">
            <div style="color:var(--accent); text-transform:uppercase; font-size:2.2rem; margin-bottom:10px;">Quest Complete!</div>
            <svg class="trophy-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M6 9H4.5a2.5 2.5 0 010-5H6M18 9h1.5a2.5 2.5 0 000-5H18M4 22h16M10 14.66V17c0 .55.45 1 1 1h2c.55 0 1-.45 1-1v-2.34M12 4v10.66M8 4h8v9a4 4 0 01-8 0V4z"/>
            </svg>
            <div style="font-size: 1.6rem; margin-bottom: 20px;">YOU HAVE UNLOCKED THE FINAL DOSSIER.</div>
            <div style="font-size: 2.5rem; background: var(--accent); color: #000; padding: 10px; border: 4px solid #fff; margin-bottom: 25px;">Trophy: Knower of Abhishek</div>
            <button onclick="closeMastery()" style="font-family:'VT323'; cursor:pointer; font-size: 1.5rem; background:#fff; color:#000; padding: 8px 20px; border:none; text-transform:uppercase;">Continue</button>
        </div>
    </div>

    <script>
        const contentData = {
            "Board Games": { img: "assets/shasn.jpg", points: ["Co-created SHASN:AZADI, a political strategy game about freedom struggles.", "Funded on Kickstarter, raising over $200,000 from backers globally.", "First board game to win the Games for Change Award for social impact."] },
            "Art": { img: "assets/artcade.jpg", points: ["Creator of Artcade Night, gamifying art exhibits to make them accessible and engaging.", "Sold-out shows at CSMVS museum and Mumbai galleries like Art+Charlie.", "Bridging the gap between fine art and play."] },
            "Education": { img: "assets/teaching.jpg", points: ["Taught game design at ISDI and Somaiya College of Design.", "Authored custom curriculum focusing on 'learning by making'.", "Conducted workshops with NGOs on gender, science, and storytelling."] },
            "Community": { img: "assets/community.jpg", points: ["Co-founded One Last Rule Club in 2023 for Bombay's creative community.", "A monthly hub for designers, artists, and gamers to build and play together.", "Grown to 80+ active members."] },
            "Immersive Experiences": { img: "assets/immersive.jpg", points: ["Writer/Performer in 'She Moves Tech' (AI bias) and 'Blood Moon Over Bengaluru' (Queer horror).", "Six-year daily art streak (ongoing since April 1, 2019).", "Specializing in interactive narrative structures."] },
            "Social Work": { img: "assets/social.jpg", points: ["Artist in Residence at Govandi Arts Festival, co-authoring the game 'Mohalla'.", "Designed gamified addiction toolkits with Krupa Foundation.", "Facilitated workshops exploring patriarchy with The Gender Lab."] },
            "Press Coverage": { type: "press", video: "https://www.youtube.com/embed/4lUhJdXHriw", links: [{t: "SHASN: AZADI Wins At Games For Change", l: "https://www.timesnownews.com/technology-science/shasn-azadi-bags-best-tabletop-game-at-games-for-change-awards-article-102566432"}, {t: "Interview about Blood Moon", l: "https://thenodmag.com/content/blood-moon-over-immersive-play-bengaluru"}, {t: "Interview about Artcade Night", l: "https://www.mid-day.com/mumbai-guide/things-to-do/article/love-art-indulge-in-this-interactive-game-night-to-learn-more-about-paintings-23515186"}, {t: "Semi-cooperative blueprint", l: "https://www.boardgamequest.com/shasn-azadi-preview/"}] }
        };

        const fullBioText = "Abhishek Lamba is a game designer, writer, and educator. They co-created the award-winning SHASN:AZADI and specialize in immersive theater and gamified art exhibits. They are the co-founder of One Last Rule Club and are proudly non-binary.";
        let j = 0;
        function type() { if (j < fullBioText.length) { document.getElementById('bio-text').innerHTML += fullBioText.charAt(j); j++; setTimeout(type, 10); } }

        let visited = JSON.parse(localStorage.getItem('visited_sections')) || [];
        function updateProgress() {
            document.getElementById('visited-count').innerText = visited.length;
            document.getElementById('prog-bar').style.width = ((visited.length / 7) * 100) + '%';
        }

        function openModal(key) {
            document.getElementById('loading-screen').style.display = 'flex';
            
            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
                if (!visited.includes(key)) {
                    visited.push(key);
                    localStorage.setItem('visited_sections', JSON.stringify(visited));
                    updateProgress();
                }
                const section = contentData[key];
                const content = document.getElementById('modal-content');
                document.getElementById('modal-title').innerText = key;

                if (section.type === "press") {
                    content.innerHTML = `<div class="video-hero"><iframe src="${section.video}" frameborder="0" allowfullscreen></iframe></div><div class="press-grid">` + section.links.map(link => `<a href="${link.l}" class="press-link" target="_blank">${link.t}</a>`).join('') + `</div>`;
                } else {
                    content.innerHTML = `<div class="img-container"><img src="${section.img}"></div><ul class="label-list">` + section.points.map(p => `<li class="label-item"><span class="label-arrow">→</span>${p}</li>`).join('') + `</ul>`;
                }
                document.getElementById('modal-overlay').style.display = "block";
                if (visited.length === 7 && !localStorage.getItem('mastery_achieved')) {
                    setTimeout(revealMastery, 1200); 
                }
            }, 600); // 0.6s Loading animation
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = "none"; }
        function revealMastery() { document.getElementById('mastery-overlay').style.display = "flex"; localStorage.setItem('mastery_achieved', 'true'); }
        function closeMastery() { document.getElementById('mastery-overlay').style.display = "none"; }

        type();
        updateProgress();
    </script>
</body>
</html>
