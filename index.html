<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Game Designer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="hud">
        <div class="xp-container">
            <span>EXPLORATION XP</span>
            <div class="bar-bg">
                <div id="xp-fill" style="width: 0%"></div>
            </div>
            <span id="xp-text">0/7 Cards Discovered</span>
        </div>
    </div>

    <main id="tabletop">
        <h1 class="instruction">Select a card from your hand...</h1>
        
        <div id="card-hand">
            </div>
    </main>

    <div id="overlay" class="hidden">
        <button id="close-btn">← Back to Hand</button>
        <div id="content-area"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
